  /custom_fields:
    parameters:
      - $ref: '#/components/parameters/pretty'
    post:
      summary: Create a custom field
      description: |-
        <b>Required scope: </b><code>custom_fields:write</code>

        Creates a new custom field in a workspace. Every custom field is required
        to be created in a specific workspace, and this workspace cannot be
        changed once set.

        A custom field’s name must be unique within a workspace and not conflict
        with names of existing task properties such as `Due Date` or `Assignee`.
        A custom field’s type must be one of `text`, `enum`, `multi_enum`, `number`,
        `date`, or `people`.

        Returns the full record of the newly created custom field.
      tags:
        - Custom fields
      operationId: createCustomField
      parameters:
        - name: opt_fields
          in: query
          description: This endpoint returns a resource which excludes some properties
            by default. To include those optional properties, set this query parameter
            to a comma-separated list of the properties you wish to include.
          required: false
          example:
            - asana_created_field
            - created_by
            - created_by.name
            - currency_code
            - custom_label
            - custom_label_position
            - date_value
            - date_value.date
            - date_value.date_time
            - default_access_level
            - description
            - display_value
