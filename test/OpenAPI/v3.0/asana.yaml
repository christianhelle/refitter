      in: query
      description: >-
        Inclusive lower bound. Runs are ordered and filtered by when their usage was
        recorded (the
        monotonic timestamp used for incremental polling), not by `run_started_at`.
        Omitted ⇒ the
        2025-01-08 floor — no credit data exists before then, and there is no limit
        on how far back
        you can query. A value earlier than 2025-01-08 is treated as 2025-01-08 (not
        rejected),
        matching the audit log.
      required: false
      schema:
        type: string
        format: date-time
    ai_studio_end_at:
      name: end_at
      in: query
      description: >-
        Filter to runs whose usage was recorded before this time (exclusive) — by
        when the run's
        credit usage was recorded, not by `run_started_at`. Defaults to the time of
        the request.
      required: false
      schema:
        type: string
        format: date-time
    ai_studio_seat_state:
      name: state
      in: query
      description: Filter seats to this state.
      required: false
      schema:
        type: string
        enum:
          - active
          - revoked
    ai_studio_division_gid:
      name: division_gid
      in: query
      description: >-
        Scope results to a single division (its gid). Omitted ⇒ the org's first
        licensed division. Use this to retrieve only one division's slice (e.g. for
        a
        division-level admin or billing owner) rather than the whole organization.
      required: false
      schema:
        type: string
        format: id
  responses:
    GenericErrorResponse:
      description: >-
        Sadly, sometimes requests to the API are not successful. Failures can
        occur for a wide range of reasons. In all cases, the API should return
        an HTTP Status Code that indicates the nature of the failure,
        with a response body in JSON format containing additional information.
        In the event of a server error the response body will contain an error
        phrase. These phrases are automatically generated using the
        [node-asana-phrase
        library](https://github.com/Asana/node-asana-phrase) and can be used by
        Asana support to quickly look up the incident that caused the server
        error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: >-
        This usually occurs because of a missing or malformed parameter. Check
        the documentation and the syntax of your request and try again.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: >-
        A valid authentication token was not provided with the request, so the
        API could not associate a user with the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PaymentRequired:
      description: >-
        The request was valid, but the queried object or object mutation
        specified in the request is above your current premium level.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: >-
        The authentication and request syntax was valid but the server is
        refusing to complete the request. This can happen if you try to read or
        write to objects or properties that the user does not have access to.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: >-
        Either the request method and path supplied do not specify a known
        action in the API, or the object specified by the request does not
        exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: >-
        You have exceeded one of the enforced rate limits in the API. See the
        [documentation on rate
        limiting](https://developers.asana.com/docs/#rate-limits)
        for more information.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: >-
        There was a problem on Asana’s end.
        In the event of a server error the response body should contain an error
        phrase. These phrases can be used by Asana support to quickly look up the
        incident that caused the server error.
        Some errors are due to server load, and will not supply an error phrase.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: >-
        There is an issue between the load balancers and Asana's API.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: >-
        Either the upstream service is unavailable to the API, or the API has been
        intentionally shut off.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: >-
        This request took too long to complete.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AgentCompact:
      description: >-
        A generic Asana Resource, containing a globally unique identifier.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: agent
          x-insert-after: gid
        resource_subtype:
          description: >-
            The subtype of the agent. `asana_teammate` is an Asana-built teammate.
          type: string
          readOnly: true
          enum:
            - asana_teammate
          example: asana_teammate
        name:
          description: >-
            The display name of the agent.
          type: string
          readOnly: true
          example: Developer Blog Writer
    AgentResponse:
      allOf:
        - $ref: '#/components/schemas/AgentCompact'
        - type: object
          required:
            - workspace
          properties:
            description:
              description: A brief description of what the agent does.
              type: string
              readOnly: true
              nullable: true
            behavior_guidance:
              description: >-
                A description of the agent's behavior.
              type: string
              readOnly: true
              nullable: true
            workspace:
              description: The workspace this agent is instantiated within.
              readOnly: true
              allOf:
                - $ref: '#/components/schemas/WorkspaceCompact'
                - type: object
            photo:
              type: object
              nullable: true
              readOnly: true
              description: >-
                A map of the agent's avatar image in various sizes, or null if no
                photo is set.
              properties:
                image_21x21:
                  type: string
                  format: uri
                  description: PNG image at 21x21 pixels.
                image_27x27:
                  type: string
                  format: uri
                  description: PNG image at 27x27 pixels.
                image_36x36:
                  type: string
                  format: uri
                  description: PNG image at 36x36 pixels.
                image_60x60:
                  type: string
                  format: uri
                  description: PNG image at 60x60 pixels.
                image_128x128:
                  type: string
                  format: uri
                  description: PNG image at 128x128 pixels.
                image_1024x1024:
                  type: string
                  format: uri
                  description: JPEG image at 1024x1024 pixels.
              example:
                image_21x21: https://...
                image_27x27: https://...
                image_36x36: https://...
                image_60x60: https://...
                image_128x128: https://...
                image_1024x1024: https://...
    AllocationBase:
      description: >-
        A generic Asana Resource, containing a globally unique identifier.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: allocation
          x-insert-after: gid
        start_date:
          type: string
          format: date
          description: >-
            The localized day on which the allocation starts.
          example: '2024-02-28'
        end_date:
          type: string
          format: date
          description: >-
            The localized day on which the allocation ends.
          example: '2024-02-28'
        effort:
          type: object
          nullable: true
          description: >-
            The amount of time associated with the allocation, represented as a percentage
            or number of hours.
          properties:
            type:
              type: string
              description: >-
                The units used for tracking effort on an allocation, either "hours"
                or "percent".
              enum:
                - hours
                - percent
            value:
              type: number
              description: >-
                The numeric effort value on the allocation.
              example: 50
    AllocationResponse:
      allOf:
        - $ref: '#/components/schemas/AllocationBase'
        - type: object
          properties:
            assignee:
              allOf:
                - $ref: '#/components/schemas/UserCompact'
                - type: object
                  description: >-
                    The user or placeholder assigned to the allocation.
                  properties:
                    name:
                      type: string
                      description: >-
                        The name of allocation resource.
                      example: Greg Sanchez
            created_by:
              $ref: '#/components/schemas/UserCompact'
              type: object
              description: >-
                The user who created the allocation.
            parent:
              $ref: '#/components/schemas/ProjectCompact'
              type: object
              description: >-
                The project the allocation is on.
            resource_subtype:
              description: The subtype of the allocation.
              type: string
              example: project_allocation
    AllocationRequest:
      allOf:
        - $ref: '#/components/schemas/AllocationBase'
        - type: object
          properties:
            assignee:
              type: string
              description: >-
                Globally unique identifier for the user or placeholder assigned to
                the allocation.
            parent:
              type: string
              description: >-
                Globally unique identifier for the project the allocation is on.
    AddCustomFieldSettingRequest:
      type: object
      required:
        - custom_field
      properties:
        custom_field:
          oneOf:
            - type: string
              description: The custom field to associate with this container.
              example: '14916'
            - $ref: '#/components/schemas/CustomFieldCreateRequest'
        is_important:
          description: >-
            Whether this field should be considered important to this container
            (for instance, to display in the list view of items in the container).
          type: boolean
          example: true
        insert_before:
          description: >-
            A gid of a Custom Field Setting on this container, before which the new
            Custom Field Setting will be added.  `insert_before` and `insert_after`
            parameters cannot both be specified.
          type: string
          example: '1331'
        insert_after:
          description: >-
            A gid of a Custom Field Setting on this container, after which the new
            Custom Field Setting will be added.  `insert_before` and `insert_after`
            parameters cannot both be specified.
          type: string
          example: '1331'
    AddFollowersRequest:
      type: object
      required:
        - followers
      properties:
        followers:
          description: >-
            An array of strings identifying users. These can either be the string
            "me", an email, or the gid of a user.
          type: string
          example: 521621,621373
    AddMembersRequest:
      type: object
      required:
        - members
      properties:
        members:
          description: >-
            An array of strings identifying users. These can either be the string
            "me", an email, or the gid of a user.
          type: string
          example: 521621,621373
    AsanaNamedResource:
      description: >-
        A generic Asana Resource, containing a globally unique identifier.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: task
          x-insert-after: gid
        name:
          description: The name of the object.
          type: string
          example: Bug Task
    AsanaResource:
      description: >-
        A generic Asana Resource, containing a globally unique identifier.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: task
          x-insert-after: gid
    AttachmentBase:
      $ref: '#/components/schemas/AttachmentCompact'
    AttachmentCompact:
      description: >-
        An *attachment* object represents any file attached to a task in
        Asana, whether it's an uploaded file or one associated via a
        third-party service such as Dropbox or Google Drive.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: attachment
          x-insert-after: gid
        name:
          description: The name of the file.
          type: string
          readOnly: true
          example: Screenshot.png
        resource_subtype:
          description: >-
            The service hosting the attachment. Valid values are `asana`,
            `dropbox`, `gdrive`, `onedrive`, `box`, `vimeo`, and `external`.
          type: string
          example: dropbox
    AttachmentRequest:
      type: object
      required:
        - parent
      properties:
        resource_subtype:
          description: >
            The type of the attachment. Must be one of the given values.
            If not specified, a file attachment of type `asana`
            will be assumed. Note that if the value of `resource_subtype` is `external`,
            a
            `parent`, `name`, and `url` must also be provided.
          type: string
          example: external
          enum:
            - asana
            - external
        file:
          description: >
            Required for `asana` attachments.
          type: string
          format: binary
        parent:
          description: >
            Required identifier of the parent task, project, or project_brief, as
            a string.
          type: string
        url:
          description: >
            The URL of the external resource being attached. Required for
            attachments of type `external`.
          type: string
        name:
          description: >
            The name of the external resource being attached. Required for
            attachments of type `external`.
          type: string
        connect_to_app:
          description: |-
            *Optional*. Only relevant for external attachments with a parent task.
            A boolean indicating whether the current app should be connected with
            the attachment for the purposes of showing an app components widget.
            Requires the app to have been added to a project the parent task is in.
            This property can only be set if an OAuth token is used to authenticate the request.

            Criteria for displaying app widget:
            1. An OAuth token must be used to authenticate the request
            2. The app needs to have its `widget_metadata_url` configured in the developer console
            3. The task the attachment is being attached to must be in a project with the app installed
          type: boolean
    AttachmentResponse:
      allOf:
        - $ref: '#/components/schemas/AttachmentBase'
        - type: object
          properties:
            created_at:
              description: The time at which this resource was created.
              type: string
              format: date-time
              readOnly: true
              example: '2012-02-22T02:06:58.147Z'
            download_url:
              description: >-
                The URL containing the content of the attachment.

                *Note:* May be null if the attachment is hosted by
                [Box](https://www.box.com/) and will be null if the attachment
                is a Video Message hosted by [Vimeo](https://vimeo.com/). If
                present, this URL may only be valid for two minutes from the
                time of retrieval. You should avoid persisting this URL somewhere
                and just refresh it on demand to ensure you do not keep stale URLs.
              type: string
              format: uri
              readOnly: true
              nullable: true
              example: https://s3.amazonaws.com/assets/1234/Screenshot.png
            permanent_url:
              description: >-
                A stable URL for accessing the attachment through the Asana web application.
                This URL redirects to the file download location (e.g., an S3 link)
                if the
                user is authenticated and authorized to view the parent object (e.g.,
                a task).
                Unauthorized users will receive a `403 Forbidden` response. This link
                is persistent
                and does not expire, but requires an active session to resolve.
              type: string
              format: uri
              readOnly: true
              nullable: true
              example: https://app.asana.com/app/asana/-/get_asset?asset_id=1234567890
            host:
              description: >-
                The service hosting the attachment. Valid values are `asana`,
                `dropbox`, `gdrive`, `onedrive`, `box`, `vimeo`, and `external`.
              type: string
              readOnly: true
              example: dropbox
            parent:
              allOf:
                - $ref: '#/components/schemas/TaskCompact'
                - type: object
                  nullable: true
                  description: The task this attachment is attached to.
                  readOnly: true
                  properties:
                    resource_subtype:
                      description: >-
                        The resource subtype of the parent resource that the filter
                        applies to.
                      type: string
                      example: default_task
                      nullable: true
            size:
              description: >-
                The size of the attachment in bytes. Only present when the `resource_subtype`
                is `asana`.
              type: integer
              readOnly: true
              example: 12345
            view_url:
              description: >-
                The URL where the attachment can be viewed, which may be
                friendlier to users in a browser than just directing them to a raw
                file. May be null if no view URL exists for the service.
              type: string
              format: uri
              readOnly: true
              nullable: true
              example: https://www.dropbox.com/s/123/Screenshot.png
            connected_to_app:
              description: >-
                Whether the attachment is connected to the app making the request
                for the purposes of
                showing an app components widget. Only present when the `resource_subtype`
                is
                `external` or `gdrive`.
              type: boolean
              readOnly: true
    AuditLogEvent:
      description: >-
        An object representing a single event within an Asana domain.


        Every audit log event is comprised of an `event_type`, `actor`, `resource`,
        and `context`.
        Some events will include additional metadata about the event under `details`.
        See our [currently supported list of events](/docs/audit-log-events#supported-audit-log-events)
        for more details.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the `AuditLogEvent`, as a string.
          type: string
          example: '12345'
          x-insert-after: false
        created_at:
          description: The time the event was created.
          type: string
          format: date-time
          example: '2021-01-01T00:00:00.000Z'
        event_type:
          description: The type of the event.
          type: string
          example: task_deleted
        event_category:
          description: The category that this `event_type` belongs to.
          type: string
          example: deletion
        actor:
          $ref: '#/components/schemas/AuditLogEventActor'
        resource:
          $ref: '#/components/schemas/AuditLogEventResource'
        details:
          $ref: '#/components/schemas/AuditLogEventDetails'
        context:
          $ref: '#/components/schemas/AuditLogEventContext'
    AuditLogEventActor:
      description: >-
        The entity that triggered the event. Will typically be a user.
      type: object
      properties:
        actor_type:
          description: >-
            The type of actor.

            Can be one of `user`, `asana`, `asana_support`, `anonymous`, or `external_administrator`.
          type: string
          enum:
            - user
            - asana
            - asana_support
            - anonymous
            - external_administrator
          example: user
        gid:
          description: >-
            Globally unique identifier of the actor, if it is a user.
          type: string
          example: '1111'
        name:
          description: The name of the actor, if it is a user.
          type: string
          example: Greg Sanchez
        email:
          description: The email of the actor, if it is a user.
          type: string
          example: gregsanchez@example.com
    AuditLogEventContext:
      description: The context from which this event originated.
      type: object
      properties:
        context_type:
          description: >-
            The type of context.

            Can be one of `web`, `desktop`, `mobile`, `asana_support`, `asana`, `email`,
            or `api`.
          type: string
          enum:
            - web
            - desktop
            - mobile
            - asana_support
            - asana
            - email
            - api
          example: web
        api_authentication_method:
          description: >-
            The authentication method used in the context of an API request.

            Only present if the `context_type` is `api`. Can be one of `cookie`, `oauth`,
            `personal_access_token`, or `service_account`.
          type: string
          enum:
            - cookie
            - oauth
            - personal_access_token
            - service_account
        client_ip_address:
          description: The IP address of the client that initiated the event, if applicable.
          type: string
          example: 1.1.1.1
        user_agent:
          description: The user agent of the client that initiated the event, if applicable.
          type: string
          example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like
            Gecko) Chrome/51.0.2704.103 Safari/537.36
        oauth_app_name:
          description: >-
            The name of the OAuth App that initiated the event.

            Only present if the `api_authentication_method` is `oauth`.
          type: string
        rule_name:
          description: >-
            The name of the automation rule that initiated the event.
          type: string
          example: When Task is added to this project
        on_behalf_of_user_id:
          description: >-
            The ID of the user who requested a change via support.
          type: integer
          example: 12345
    AuditLogEventDetails:
      description: Event specific details. The schema will vary depending on the `event_type`.
      type: object
      properties:
        old_value:
          description: >-
            The previous value of the field that was modified in the audited event.
          type: string
          nullable: true
        new_value:
          description: >-
            The new value after the modification in the audited event.
          type: string
          nullable: true
        group:
          description: >-
            The division or organizational unit where the event occurred.
            Primarily used to scope role change events (e.g., `user_division_admin_role_changed`),
            but may appear in other contexts involving group-level changes.
          type: object
          additionalProperties: true
        saml_response:
          description: >-
            The response received from the IdP when a user logs in with SAML SSO.
            Present on `user_login_failed` and `user_login_succeeded` events.
          type: string
          nullable: true
      additionalProperties: true
    AuditLogEventResource:
      description: The primary object that was affected by this event.
      type: object
      properties:
        resource_type:
          description: The type of resource.
          type: string
          example: task
        resource_subtype:
          description: The subtype of resource. Most resources will not have a subtype.
          type: string
          example: milestone
        gid:
          description: Globally unique identifier of the resource.
          type: string
          example: '1111'
        name:
          description: The name of the resource.
          type: string
          nullable: true
          example: Example Task
        email:
          description: The email of the resource, if applicable.
          type: string
    BatchRequest:
      description: A request object for use in a batch request.
      type: object
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/BatchRequestAction'
    BatchRequestAction:
      description: An action object for use in a batch request.
      type: object
      properties:
        relative_path:
          description: >-
            The path of the desired endpoint relative to the API’s base URL. Query
            parameters are not accepted here; put them in `data` instead.
          type: string
          example: /tasks/123
        method:
          description: The HTTP method you wish to emulate for the action.
          type: string
          enum:
            - get
            - post
            - put
            - delete
            - patch
            - head
          example: get
        data:
          description: >-
            For `GET` requests, this should be a map of query parameters you would
            have normally passed in the URL. Options and pagination are not
            accepted here; put them in `options` instead. For `POST`, `PATCH`, and
            `PUT` methods, this should be the content you would have normally put
            in the data field of the body.
          type: object
          example:
            assignee: me
            workspace: '1337'
        options:
          description: >-
            Pagination (`limit` and `offset`) and output options (`fields` or
            `expand`) for the action. “Pretty” JSON output is not an available
            option on individual actions; if you want pretty output, specify that
            option on the parent request.
          type: object
          properties:
            limit:
              description: Pagination limit for the request.
              type: integer
              example: 50
            offset:
              description: Pagination offset for the request.
              type: integer
              example: eyJ0eXAiOJiKV1iQLCJhbGciOiJIUzI1NiJ9
            fields:
              description: The fields to retrieve in the request.
              type: array
              items:
                type: string
              example:
                - name
                - gid
                - notes
                - completed
          example:
            limit: 3
            fields:
              - name
              - notes
              - completed
      required:
        - relative_path
        - method
    BatchResponse:
      description: A response object returned from a batch request.
      type: object
      properties:
        status_code:
          description: The HTTP status code that the invoked endpoint returned.
          type: integer
          example: 200
        headers:
          description: >-
            A map of HTTP headers specific to this result. This is primarily used
            for returning a `Location` header to accompany a `201 Created`
            result.  The parent HTTP response will contain all common headers.
          type: object
          example:
            location: /tasks/1234
        body:
          description: The JSON body that the invoked endpoint returned.
          type: object
          example:
            data:
              gid: '1967'
              completed: false
              name: Hello, world!
              notes: How are you today?
    BudgetCompact:
      description: >-
        A *budget* object represents a budget for a given parent.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: budget
          x-insert-after: gid
        budget_type:
          type: string
          description: The type of the budget, in "cost" or "time". The value of this
            property will dictate how the corresponding values for actual, estimate,
            and total are interpreted.
          enum:
            - cost
            - time
    BudgetResponse:
      allOf:
        - $ref: '#/components/schemas/BudgetCompact'
        - type: object
          properties:
            estimate:
              allOf:
                - $ref: '#/components/schemas/BudgetEstimateResponse'
            actual:
              allOf:
                - $ref: '#/components/schemas/BudgetActualResponse'
            total:
              allOf:
                - $ref: '#/components/schemas/BudgetTotalResponse'
            parent:
              allOf:
                - $ref: '#/components/schemas/ProjectCompact'
                - type: object
    BudgetRequest:
      allOf:
        - $ref: '#/components/schemas/BudgetCompact'
        - type: object
          properties:
            estimate:
              allOf:
                - $ref: '#/components/schemas/BudgetEstimateRequest'
            actual:
              allOf:
                - $ref: '#/components/schemas/BudgetActualRequest'
            total:
              allOf:
                - $ref: '#/components/schemas/BudgetTotalRequest'
            parent:
              description: >-
                Globally unique ID of the parent object: project. Can only be set
                on create, immutable thereafter.
              type: string
              example: '181636'
    BudgetEstimateRequest:
      description: >-
        Defines how the estimate portion of a budget is configured.
        This object controls whether the estimate is enabled, what data source it
        uses,
        and which tasks (by billable status) are included in calculating the estimate
        value.
        When disabled (enabled: false and source: none), the estimate is hidden and
        the API response will return `value: null` and `units: null` for this field.
      type: object
      properties:
        billable_status_filter:
          description: >-
            Billable status filter applied to the estimate when `source` is `tasks`.
            Ignored when `source` is `capacity_plans` or `none`.
            When not provided, defaults to `billable`.
          type: string
          enum:
            - billable
            - non_billable
            - any
        source:
          description: >-
            The data source for the estimate.
            `tasks`: use task-level estimated time attributed to the parent.
            `capacity_plans`: use capacity plan estimates attributed to the parent.
            `none`: disables the estimate; only valid when `enabled` is `false`.
            When `enabled` is `true`, `source` must not be `none`.
          type: string
          example: tasks
          enum:
            - none
            - tasks
            - capacity_plans
        enabled:
          description: >-
            Controls whether the estimate is displayed in the budget.
            This flag primarily affects UI presentation and the response payload.
            When `false` (and `source` is `none`), the estimate is hidden and the
            API response
            will return `value: null` and `units: null` for this field.
          type: boolean
          example: true
    BudgetEstimateResponse:
      allOf:
        - $ref: '#/components/schemas/BudgetEstimateRequest'
        - type: object
          description: >-
            Represents the computed estimate portion of a budget.
            This object includes the calculated estimate value and its corresponding
            units.
            The estimate reflects aggregated data from the configured source, and
            when source is tasks, the specified billable_status_filter determines
            which tasks contribute.
            When disabled (enabled: false and source: none), both value and units
            will be null.
          properties:
            units:
              description: >-
                The units of the estimate value.
                When `budget_type` is `time`, units are `"minutes"`.
                When `budget_type` is `cost`, units are the ISO 4217 currency code
                configured at the domain level.
                When `source` is `none` and `enabled` is `false`, this field will
                be `null`.
              type: string
              example: USD
              readOnly: true
            value:
              description: >-
                The aggregated estimate value for the budget.
                This value is computed based on the selected `source` and, when `source`
                is `tasks`, the specified `billable_status_filter`.
                When `budget_type` is `time`, represents the aggregated estimated
                minutes on the parent.
                When `budget_type` is `cost`, represents the aggregated estimated
                cost on the parent (estimated time x resource rate).
                When `source` is `none` and `enabled` is `false`, this field will
                be `null`.
              type: number
              example: 100
              readOnly: true
    BudgetActualRequest:
      type: object
      description: >-
        Defines the configuration of the actual portion of a budget.
        The actual value represents aggregated time tracking data attributed to the
        budget’s parent.
        This object controls which time entries are included based on their billable
        status.
        When no entries match the selected filter, the value will be 0.
      properties:
        billable_status_filter:
          type: string
          description: >-
            Billable status filter applied to time tracking entries contributing to
            the actual value.
            Determines which entries are included in aggregation.
            When not provided, defaults to `billable`.
          enum:
            - billable
            - non_billable
            - any
          example: billable
    BudgetActualResponse:
      allOf:
        - $ref: '#/components/schemas/BudgetActualRequest'
        - type: object
          description: >-
            Represents the computed actual portion of a budget.
            The actual value is derived from time tracking entries attributed to the
            budget’s parent,
            filtered according to the specified billable_status_filter.
            When budget_type is time, it represents minutes; when budget_type is cost,
            it represents total cost (actual time × resource rate).
            When no applicable entries exist, value will be 0.
          properties:
            value:
              description: >-
                The aggregated actual value for the budget.
                * When `budget_type` is `time`, represents the total actual minutes
                from time tracking entries.
                * When `budget_type` is `cost`, represents the total actual cost,
                computed as (actual time × resource rate).
              type: number
              example: 100
              readOnly: true
            units:
              description: >-
                The units of the actual value.
                * When `budget_type` is `time`, units are `"minutes"`.
                * When `budget_type` is `cost`, units are the ISO 4217 currency code
                configured at the domain level.
              type: string
              example: USD
              readOnly: true
    BudgetTotalRequest:
      type: object
      description: >-
        Defines how the total portion of a budget is configured.
        The total represents a user-defined target value, not an aggregated one.
        This object specifies whether the total is displayed and the current value
        for the selected budget_type.
      properties:
        enabled:
          description: >-
            Indicates whether the total value is active and should be displayed in
            the budget.
            This flag primarily affects UI presentation and the response payload.
          type: boolean
          example: true
        value:
          description: >-
            The user-set value for the total budget.
            When `budget_type` is `time`, represents minutes.
            When `budget_type` is `cost`, represents the monetary amount in the domain's
            currency.
            This value is stored separately for each `budget_type`, so switching between
            types preserves each value.
          type: number
          example: 100
    BudgetTotalResponse:
      allOf:
        - $ref: '#/components/schemas/BudgetTotalRequest'
        - type: object
          description: >-
            Represents the configured total portion of a budget.
            The total value is user-defined and may differ for each budget_type.
            When budget_type is time, it is expressed in minutes; when budget_type
            is cost,
            it is expressed in the domain’s ISO 4217 currency code.
            When enabled is false, both value and units will be null.
          properties:
            units:
              description: >-
                The units of the total value.
                When `budget_type` is `time`, units are `"minutes"`.
                When `budget_type` is `cost`, units are the ISO 4217 currency code
                configured at the domain level.
                When `enabled` is `false`, this field will be `null`.
              type: string
              example: USD
              readOnly: true
    CustomFieldBase:
      allOf:
        - $ref: '#/components/schemas/CustomFieldCompact'
        - type: object
          properties:
            description:
              description: >-
                [Opt
                In](/docs/inputoutput-options).
                The description of the custom field.
              type: string
              example: Development team priority
            enum_options:
              description: >-
                *Conditional*. Only relevant for custom fields of type `enum` or `multi_enum`.
                This array specifies the possible values which an `enum` custom
                field can adopt. To modify the enum options, refer to [working
                with enum
                options](/reference/createenumoptionforcustomfield).
              type: array
              items:
                $ref: '#/components/schemas/EnumOption'
            precision:
              description: >-
                Only relevant for custom fields of type `Number`. This field
                dictates the number of places after the decimal to round to, i.e.
                0 is integer values, 1 rounds to the nearest tenth, and so on.
                Must be between 0 and 6, inclusive.

                For percentage format, this may be unintuitive, as a value of 0.25
                has a precision of 0, while a value of 0.251 has a precision of 1.
                This is due to 0.25 being displayed as 25%.

                The identifier format will always have a precision of 0.
              type: integer
              example: 2
            format:
              description: >-
                The format of this custom field.
              type: string
              enum:
                - currency
                - identifier
                - percentage
                - custom
                - duration
                - none
              example: custom
            currency_code:
              description: >-
                ISO 4217 currency code to format this custom field. This will be
                null if the `format` is not `currency`.
              type: string
              nullable: true
              example: EUR
            custom_label:
              description: >-
                This is the string that appears next to the custom field value.
                This will be null if the `format` is not `custom`.
              type: string
              nullable: true
              example: gold pieces
            custom_label_position:
              description: >-
                Only relevant for custom fields with `custom` format. This depicts
                where to place the custom label. This will be null if the `format`
                is not `custom`.
              type: string
              nullable: true
              enum:
                - prefix
                - suffix
                - null
              example: suffix
            is_global_to_workspace:
              description: >-
                This flag describes whether this custom field is available to
                every container in the workspace. Before project-specific custom
                fields, this field was always true.
              type: boolean
              example: true
              readOnly: true
            has_notifications_enabled:
              description: >-
                *Conditional*. This flag describes whether a follower of a task
                with this field should receive inbox notifications from changes
                to this field.
              type: boolean
              example: true
            asana_created_field:
