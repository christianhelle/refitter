              type: integer
              example: 5
              readOnly: true
            num_likes:
              description: The number of users who have liked this status.
              type: integer
              example: 5
              readOnly: true
            parent:
              allOf:
                - $ref: '#/components/schemas/ProjectCompact'
                - type: object
                  description: >-
                    The parent of the status update. This can be a project,
