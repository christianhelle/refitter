    ProjectCompact:
      description: >-
        A *project* represents a prioritized list of tasks in Asana or a board
        with columns of tasks represented as cards. It exists in a single
        workspace or organization and is accessible to a subset of users in
        that workspace or organization, depending on its permissions.
      type: object
      properties:
        gid:
          description: >-
            Globally unique identifier of the resource, as a string.
          type: string
          readOnly: true
          example: '12345'
          x-insert-after: false
        resource_type:
          description: The base type of this resource.
          type: string
          readOnly: true
          example: project
          x-insert-after: gid
        name:
          description: >-
            Name of the project. This is generally a short sentence fragment
            that fits on a line in the UI for maximum readability. However, it
            can be longer.
          type: string
          example: Stuff to buy
    ProjectDuplicateRequest:
      type: object
      required:
        - name
      properties:
        name:
          description: The name of the new project.
          type: string
          example: New Project Name
        include:
          description: |-
            A comma-separated list of elements to include when duplicating a project.
            Some elements are automatically included and cannot be excluded,
            while others are **optional** and must be explicitly specified in this field.

            **Auto-included fields (non-configurable)**
            - Tasks
            - [Project Views](https://asana.com/features/project-management/project-views)
            (i.e., tabs in a project such as List, Board, Dashboard, etc.)
            - [Rules](https://help.asana.com/s/article/rules)

            *Note: The Owner of the Rules copied to the new project is the user who performs the API call.
            If the duplication is performed using a [Service Account](/docs/authentication#/service-account),
            note that Service Accounts cannot access the UI to modify or pause Rules.
            To prevent unwanted automation behavior, consider pausing Rules in the source project before duplication —
            their active/paused state is preserved in the new project.*

            **Optional fields (configurable)**
            - allocations
            - forms
            - members
            - notes
            - permissions
            - task_assignee
            - task_attachments
            - task_dates
            - task_dependencies
            - task_followers
            - task_notes
            - task_projects
            - task_subtasks
            - task_tags
            - task_templates
            - task_type_default
          type: string
          pattern: 
            ([allocations|forms|members|notes|permissions|task_assignee|task_attachments|task_dates|task_dependencies|task_followers|task_notes|task_projects|task_subtasks|task_tags|task_templates|task_type_default])(,\1)*
          example:
            - allocations,forms,members,notes,permissions,task_assignee,task_attachments,task_dates,task_dependencies,task_followers,task_notes,task_projects,task_subtasks,task_tags,task_templates,task_type_default
        schedule_dates:
          description: >-
            A dictionary of options to auto-shift dates.
            `task_dates` must be included to use this option.
            Requires `should_skip_weekends` and either `start_on` or `due_on`, but
            not both.
          type: object
          properties:
            should_skip_weekends:
              description: >-
                **Required**: Determines if the auto-shifted dates should skip weekends.
              type: boolean
              example: true
            due_on:
              description: >-
                Sets the last due date in the duplicated project to the given
                date. The rest of the due dates will be offset by the same amount
                as the due dates in the original project.
              type: string
              example: '2019-05-21'
            start_on:
              description: >-
                Sets the first start date in the duplicated project to the given
                date. The rest of the start dates will be offset by the same amount
                as the start dates in the original project.
              type: string
              example: '2019-05-21'
    PortfolioDuplicateRequest:
      type: object
      required:
        - name
      properties:
        name:
          description: The name of the new portfolio.
          type: string
          example: New Portfolio Name
        include:
          description: |-
            A comma-separated list of elements to include when duplicating a portfolio.

            **Auto-included fields (non-configurable)**
            - Custom field settings
            - Views (tabs)

            **Optional fields (configurable)**
            - description
            - members
            - permissions
            - templates
            - rules
            - child_projects
            - child_portfolios
          type: string
          example:
            - description,members,permissions,templates,rules,child_projects,child_portfolios
