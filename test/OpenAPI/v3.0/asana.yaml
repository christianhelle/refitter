    parameters:
      - $ref: '#/components/parameters/pretty'
    get:
      summary: Get multiple memberships
      description: >-
        Returns compact `goal_membership`, `project_membership`, `portfolio_membership`,
        `custom_type_membership`, or `custom_field_membership` records. The possible
        types
        for `parent` in this request are `goal`, `project`, `portfolio`, `custom_type`,
        or `custom_field`. An additional member (user GID or
        team GID) can be passed in to filter to a specific membership.


        Alternatively, when `parent` is absent, you can use the `member` and `resource_subtype`
        parameters together to fetch all memberships
        of a specific type for a given member. For example, passing `member` as a
        team GID and `resource_subtype` as `project_membership`
        will return all project memberships for that team.
      tags:
        - Memberships
      operationId: getMemberships
      parameters:
        - name: parent
          in: query
          description: >-
