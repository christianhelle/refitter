name: Production Tests

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**/*"
      - "!.github/workflows/production-tests.yml"
    branches:
      - "main"
  schedule:
    - cron: '0 2 * * *'

jobs:

  nuget:
    name: Test NuGet Package
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: 🛒 Checkout repository
      uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: 🛠️ Run smoke test script (NuGet)
      run: ./smoke-tests.ps1 -UseProduction
      working-directory: test
      shell: pwsh

  docker:
    name: Test Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: 🛒 Checkout repository
      uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: 🛠️ Run smoke test script (Docker)
      run: ./smoke-tests.ps1 -UseDocker
      working-directory: test
      shell: pwsh

  sourcegenerator:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    uses: ./.github/workflows/template-source-generator.yml
    with:
      os: ${{ matrix.os }}

  msbuild:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: 🛒 Checkout repository
      uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: 🛠️ Add Refitter.MSBuild package
      run: dotnet add package Refitter.MSBuild --prerelease
      working-directory: test/MSBuild
    - name: 🛠️ Build MSBuild Test
      run: dotnet build
      working-directory: test/MSBuild
