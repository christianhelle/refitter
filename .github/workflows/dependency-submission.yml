name: Dependency Submission

# Override GitHub's automatic NuGet dependency submission to exclude
# platform-specific test projects (MauiExample) that require workloads
# not available on standard GitHub runners (android, wasm-tools-net8).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: |
          # Only restore the main solution (src/Refitter.slnx)
          # This excludes test/Tests.slnx which contains MauiExample
          dotnet restore src/Refitter.slnx
